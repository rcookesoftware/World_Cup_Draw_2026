<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup 2026 Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:  #00A550;
    --green2: #007A3D;
    --gold:   #FFD700;
    --gold2:  #E6B800;
    --red:    #C8102E;
    --dark:   #0a0f0d;
    --dark2:  #111a14;
    --card:   #161e18;
    --border: rgba(255,255,255,0.08);
    --text:   #f0f0f0;
    --muted:  #8a9a8d;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  /* ── HERO HEADER ── */
  header {
    background: linear-gradient(135deg, var(--green2) 0%, var(--dark2) 60%);
    border-bottom: 3px solid var(--gold);
    padding: 3rem 1rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.015) 40px,
      rgba(255,255,255,0.015) 80px
    );
  }
  header h1 {
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
    position: relative;
    text-transform: uppercase;
  }
  header h1 span {
    color: var(--gold);
    display: block;
  }
  header p {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    margin-top: 10px;
    position: relative;
  }

  .container { max-width: 760px; margin: 0 auto; padding: 2rem 1rem 0; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 1.75rem;
    margin-bottom: 1.25rem;
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--green);
    margin-bottom: 14px;
  }

  /* ── INPUT + BUTTON ── */
  .input-row { display: flex; gap: 10px; }

  input[type="text"] {
    flex: 1;
    height: 48px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 16px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus {
    border-color: var(--green);
    background: rgba(0,165,80,0.08);
  }

  .btn {
    height: 48px;
    padding: 0 24px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .btn:hover  { background: var(--green2); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { background: #2a3d2e; color: var(--muted); cursor: default; transform: none; }

  /* ── MESSAGES ── */
  .msg {
    margin-top: 14px;
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 10px;
    display: none;
    font-weight: 600;
  }
  .msg.show  { display: block; }
  .msg.error { background: rgba(200,16,46,0.15); color: #ff6b7a; border: 1px solid rgba(200,16,46,0.3); }
  .msg.info  { background: rgba(255,215,0,0.1);  color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }

  /* ── REVEAL ANIMATION ── */
  .reveal {
    display: none;
    margin-top: 1.5rem;
  }
  .reveal.show { display: block; animation: revealIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }

  @keyframes revealIn {
    from { opacity: 0; transform: scale(0.7) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .reveal-inner {
    background: linear-gradient(135deg, #0d2e1a 0%, #1a3a20 100%);
    border: 2px solid var(--gold);
    border-radius: 18px;
    padding: 2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .reveal-inner::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,215,0,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .reveal-flag {
    font-size: 80px;
    margin-bottom: 12px;
    display: block;
    animation: flagBounce 0.6s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes flagBounce {
    from { opacity: 0; transform: scale(0.4) rotate(-10deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .reveal-country {
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1px;
    animation: fadeUp 0.4s 0.5s both;
  }
  .reveal-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-top: 8px;
    animation: fadeUp 0.4s 0.65s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── STATS ── */
  .stats { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  .stat {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
  }
  .stat-num {
    font-size: 30px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }
  .stat-lbl {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 600;
  }

  /* ── RESULTS GRID ── */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  .result-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.15s, background 0.15s;
  }
  .result-item:hover {
    border-color: rgba(0,165,80,0.4);
    background: rgba(0,165,80,0.06);
  }
  .result-flag  { font-size: 28px; flex-shrink: 0; }
  .result-info  { min-width: 0; }
  .result-country {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-person {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .empty {
    text-align: center;
    padding: 2.5rem;
    color: var(--muted);
    font-size: 14px;
    grid-column: 1 / -1;
  }

  /* ── CONFIG WARNING ── */
  .config-notice {
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 1.25rem;
    line-height: 1.6;
  }
  .config-notice code {
    background: rgba(255,215,0,0.15);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 13px;
  }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-left: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--gold));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  @media (max-width: 480px) {
    .input-row { flex-direction: column; }
    .btn { width: 100%; }
    .stats { gap: 8px; }
    .stat-num { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- =====================================================
     CONFIGURATION — fill these in before deploying
     =====================================================
     1. Go to https://jsonbin.io and sign up (free)
     2. Go to API Keys → Create Access Key → copy it below
     3. Click "New Bin", create an empty bin {} → copy the Bin ID below
     ===================================================== -->
<script>
  const JSONBIN_API_KEY = "YOUR_API_KEY_HERE";
  const JSONBIN_BIN_ID  = "YOUR_BIN_ID_HERE";
</script>
<!-- ===================================================== -->

<header>
  <h1>World Cup 2026 <span>Team Draw</span></h1>
  <p>Enter your name and pull your country — each team can only be claimed once.</p>
</header>

<div class="container">

  <div id="config-warning" class="config-notice" style="display:none">
    ⚠️ <strong>Setup needed:</strong> Open this file and set <code>JSONBIN_API_KEY</code> and <code>JSONBIN_BIN_ID</code>. See comments inside the file.
  </div>

  <div class="card">
    <div class="card-label">Your draw</div>
    <div class="input-row">
      <input type="text" id="name-input" placeholder="Enter your name" maxlength="50" autocomplete="off" />
      <button class="btn" id="draw-btn" onclick="handleDraw()">Draw ⚽</button>
    </div>
    <div class="msg error" id="error-msg"></div>
    <div class="msg info"  id="info-msg"></div>
    <div class="reveal" id="reveal-box">
      <div class="reveal-inner">
        <span class="reveal-flag" id="reveal-flag"></span>
        <div class="reveal-country" id="reveal-country"></div>
        <div class="reveal-sub" id="reveal-sub"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="stat-drawn">—</div>
        <div class="stat-lbl">Drawn</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-remaining">—</div>
        <div class="stat-lbl">Remaining</div>
      </div>
      <div class="stat">
        <div class="stat-num">48</div>
        <div class="stat-lbl">Total</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="card-label">Leaderboard</div>
    <div class="results-grid" id="results-grid">
      <div class="empty">Loading draws...</div>
    </div>
  </div>

</div>

<script>
const TEAMS = [
  {name:"Argentina",flag:"🇦🇷"},{name:"Australia",flag:"🇦🇺"},{name:"Belgium",flag:"🇧🇪"},
  {name:"Brazil",flag:"🇧🇷"},{name:"Cameroon",flag:"🇨🇲"},{name:"Canada",flag:"🇨🇦"},
  {name:"Chile",flag:"🇨🇱"},{name:"Colombia",flag:"🇨🇴"},{name:"Costa Rica",flag:"🇨🇷"},
  {name:"Croatia",flag:"🇭🇷"},{name:"Denmark",flag:"🇩🇰"},{name:"Ecuador",flag:"🇪🇨"},
  {name:"Egypt",flag:"🇪🇬"},{name:"England",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},{name:"France",flag:"🇫🇷"},
  {name:"Germany",flag:"🇩🇪"},{name:"Ghana",flag:"🇬🇭"},{name:"Honduras",flag:"🇭🇳"},
  {name:"Indonesia",flag:"🇮🇩"},{name:"Iran",flag:"🇮🇷"},{name:"Japan",flag:"🇯🇵"},
  {name:"Kenya",flag:"🇰🇪"},{name:"Mexico",flag:"🇲🇽"},{name:"Morocco",flag:"🇲🇦"},
  {name:"Netherlands",flag:"🇳🇱"},{name:"New Zealand",flag:"🇳🇿"},{name:"Nigeria",flag:"🇳🇬"},
  {name:"Panama",flag:"🇵🇦"},{name:"Paraguay",flag:"🇵🇾"},{name:"Peru",flag:"🇵🇪"},
  {name:"Poland",flag:"🇵🇱"},{name:"Portugal",flag:"🇵🇹"},{name:"Qatar",flag:"🇶🇦"},
  {name:"Republic of Ireland",flag:"🇮🇪"},{name:"Saudi Arabia",flag:"🇸🇦"},{name:"Senegal",flag:"🇸🇳"},
  {name:"Serbia",flag:"🇷🇸"},{name:"Slovenia",flag:"🇸🇮"},{name:"South Korea",flag:"🇰🇷"},
  {name:"Spain",flag:"🇪🇸"},{name:"Switzerland",flag:"🇨🇭"},{name:"Trinidad & Tobago",flag:"🇹🇹"},
  {name:"Tunisia",flag:"🇹🇳"},{name:"Turkey",flag:"🇹🇷"},{name:"Ukraine",flag:"🇺🇦"},
  {name:"United States",flag:"🇺🇸"},{name:"Uruguay",flag:"🇺🇾"},{name:"Venezuela",flag:"🇻🇪"}
];

const BASE = "https://api.jsonbin.io/v3/b";
let draws = {};
let saving = false;

function configOk() {
  return JSONBIN_API_KEY !== "$2a$10$8PV7g22E60fO1HUHjO1BduUz4iBdjIVLwMVPblCh.KLHQVqP/OGma" 
  && JSONBIN_BIN_ID !== "$2a$10$cz.XU.iGvNkvtakL2gXYOurYRATkPQoaXruUFyogzZV67pJzPJ.8C";
}

async function loadDraws() {
  if (!configOk()) {
    document.getElementById("config-warning").style.display = "block";
    document.getElementById("results-grid").innerHTML = '<div class="empty">Configure JSONBin to get started.</div>';
    document.getElementById("stat-drawn").textContent = "—";
    document.getElementById("stat-remaining").textContent = "—";
    return;
  }
  try {
    const r = await fetch(`${BASE}/${JSONBIN_BIN_ID}/latest`, {
      headers: { "X-Master-Key": JSONBIN_API_KEY }
    });
    const j = await r.json();
    draws = j.record || {};
  } catch(e) {
    draws = {};
    showError("Could not load draws. Check your JSONBin config.");
  }
  render();
}

async function saveDraws() {
  await fetch(`${BASE}/${JSONBIN_BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": JSONBIN_API_KEY
    },
    body: JSON.stringify(draws)
  });
}

function getUsed()      { return Object.values(draws).map(d => d.country); }
function getAvailable() { return TEAMS.filter(t => !getUsed().includes(t.name)); }

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg; el.classList.add("show");
  document.getElementById("info-msg").classList.remove("show");
}
function showInfo(msg) {
  const el = document.getElementById("info-msg");
  el.textContent = msg; el.classList.add("show");
  document.getElementById("error-msg").classList.remove("show");
}
function clearMsgs() {
  document.getElementById("error-msg").classList.remove("show");
  document.getElementById("info-msg").classList.remove("show");
}

async function handleDraw() {
  if (saving) return;
  const name = document.getElementById("name-input").value.trim();
  if (!name) { document.getElementById("name-input").focus(); return; }
  if (!configOk()) { showError("JSONBin not configured — see the file comments."); return; }

  const key = name.toLowerCase();
  clearMsgs();

  const btn = document.getElementById("draw-btn");
  btn.disabled = true;
  btn.innerHTML = 'Drawing <span class="spinner"></span>';

  await loadDraws();

  if (draws[key]) {
    const team = TEAMS.find(t => t.name === draws[key].country);
    showInfo(`You already drew ${team ? team.flag : ""} ${draws[key].country}!`);
    triggerReveal(team ? team.flag : "🏳️", draws[key].country, `Already drawn, ${draws[key].name}!`);
    btn.disabled = false; btn.textContent = "Draw ⚽";
    return;
  }

  const available = getAvailable();
  if (available.length === 0) {
    showError("All 48 teams have been drawn — the sweepstake is full!");
    btn.disabled = false; btn.textContent = "Draw ⚽";
    return;
  }

  const pick = available[Math.floor(Math.random() * available.length)];
  draws[key] = { name, country: pick.name, flag: pick.flag };

  saving = true;
  try {
    await saveDraws();
  } catch(e) {
    showError("Draw worked but couldn't save — try again.");
    delete draws[key];
    saving = false;
    btn.disabled = false; btn.textContent = "Draw ⚽";
    return;
  }
  saving = false;

  triggerReveal(pick.flag, pick.name, `Good luck, ${name}! 🎉`);
  clearMsgs();
  render();

  btn.disabled = false; btn.textContent = "Draw ⚽";
}

function triggerReveal(flag, country, sub) {
  const box = document.getElementById("reveal-box");
  box.classList.remove("show");
  void box.offsetWidth;
  document.getElementById("reveal-flag").textContent    = flag;
  document.getElementById("reveal-country").textContent = country;
  document.getElementById("reveal-sub").textContent     = sub;
  box.classList.add("show");
}

function render() {
  const entries = Object.values(draws).sort((a,b) => a.name.localeCompare(b.name));
  const drawn = entries.length;
  document.getElementById("stat-drawn").textContent     = drawn;
  document.getElementById("stat-remaining").textContent = 48 - drawn;
  document.getElementById("progress-bar").style.width   = Math.round((drawn / 48) * 100) + "%";

  const grid = document.getElementById("results-grid");
  if (entries.length === 0) {
    grid.innerHTML = '<div class="empty">No draws yet — be the first!</div>';
    return;
  }
  grid.innerHTML = entries.map(d => `
    <div class="result-item">
      <span class="result-flag">${d.flag}</span>
      <div class="result-info">
        <div class="result-country">${d.country}</div>
        <div class="result-person">${d.name}</div>
      </div>
    </div>
  `).join("");
}

document.getElementById("name-input").addEventListener("keydown", e => {
  if (e.key === "Enter") handleDraw();
});

loadDraws();
</script>
</body>
</html>
